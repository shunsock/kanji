name: Create Release

on:
  push:
    branches:
      - main

# release 作成に必要な contents: write は job 側で付与する (最小権限)。
permissions:
  contents: read

defaults:
  run:
    working-directory: ./kanji

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: check out
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: set release tag
        id: set_release_tag
        run: |
          # extract a line from pyproject.toml
          version_line=$(grep -m 1 '^version = ' pyproject.toml)

          # extract "x.y.z" from "version = x.y.z" from the line
          version=$(echo "$version_line" | sed -E 's/version = "([0-9]+\.[0-9]+\.[0-9]+)"/\1/')
          echo "Extracted version: v${version}"

          # write version to environment variable
          echo "RELEASE_TAG=v${version}" >> "$GITHUB_ENV"

      - name: Install uv (with cache)
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          version: "0.6.16"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.10"

      - name: Create venv
        run: uv venv

      - name: Sync project
        run: uv sync --locked --all-extras

      - name: Build
        run: uv build

      # release 作成は外部 action でなく runner 同梱の gh で行う (zizmor の指摘。
      # 外部依存が減り supply-chain 面でも安全)。defaults.working-directory (./kanji)
      # が効くため dist/* は kanji/dist を指す。
      - name: create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          printf 'Release: %s :tada:\n\nCommit: %s\n' "$RELEASE_TAG" "$GITHUB_SHA" > "$RUNNER_TEMP/notes.md"
          gh release create "$RELEASE_TAG" ./dist/* \
            --target "$GITHUB_SHA" \
            --title "Release $RELEASE_TAG" \
            --notes-file "$RUNNER_TEMP/notes.md"
